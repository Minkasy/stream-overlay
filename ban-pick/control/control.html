<!DOCTYPE html>
<html lang="ja" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Draft Control</title>

  <!-- Tailwind + daisyUI -->
  <script src="https://cdn.tailwindcss.com"></script>

  <link
    href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css"
    rel="stylesheet"
    type="text/css"
  />

  <link rel="stylesheet" href="control.css">
</head>

<body class="bg-base-200 min-h-screen text-base-content">

  <div class="container mx-auto p-6 space-y-6">

    <!-- HEADER -->
    <div class="flex items-center justify-between">
      <div>
        <h1 class="text-4xl font-bold">
          Draft Control
        </h1>

        <p class="text-base-content/70 mt-1">
          Tournament Overlay Management
        </p>
      </div>
    </div>

    <!-- =====================
         TEAMS
    ====================== -->

    <section class="card bg-base-100 shadow-xl">
      <div class="card-body p-4">
    
        <div class="flex items-center justify-between mb-3">
          <h2 class="card-title text-lg">
            Teams
          </h2>
    
          <button
            class="btn btn-primary btn-sm"
            onclick="updateTeams()"
          >
            Update
          </button>
        </div>
    
        <div class="grid grid-cols-2 gap-3">
    
          <!-- TEAM 1 -->
          <div class="bg-base-200 rounded-xl p-3 space-y-2">
    
            <div class="text-sm font-bold">
              Team 1
            </div>
    
            <input
              id="team1-name"
              type="text"
              placeholder="Name"
              class="input input-bordered input-sm w-full"
            />
    
            <input
              id="team1-icon"
              type="text"
              placeholder="Icon Path"
              class="input input-bordered input-sm w-full"
            />
    
          </div>
    
          <!-- TEAM 2 -->
          <div class="bg-base-200 rounded-xl p-3 space-y-2">
    
            <div class="text-sm font-bold">
              Team 2
            </div>
    
            <input
              id="team2-name"
              type="text"
              placeholder="Name"
              class="input input-bordered input-sm w-full"
            />
    
            <input
              id="team2-icon"
              type="text"
              placeholder="Icon Path"
              class="input input-bordered input-sm w-full"
            />
    
          </div>
    
        </div>
      </div>
    </section>

    <!-- =====================
         POSITION & HISTORY
    ====================== -->

    <div class="grid grid-cols-2 gap-4">

      <!-- POSITION -->
      <section class="card bg-base-100 shadow-xl">
        <div class="card-body p-4">
    
          <h2 class="card-title text-lg mb-3">
            Overlay Position
          </h2>
    
          <div class="grid grid-cols-2 gap-2">
    
            <button class="btn btn-xs btn-outline"
              onclick="setPosition('compact-top-left')">
              Top Left
            </button>
    
            <button class="btn btn-xs btn-outline"
              onclick="setPosition('compact-top-right')">
              Top Right
            </button>
    
            <button class="btn btn-xs btn-outline"
              onclick="setPosition('compact-bottom-left')">
              Bottom Left
            </button>
    
            <button class="btn btn-xs btn-outline"
              onclick="setPosition('compact-bottom-right')">
              Bottom Right
            </button>
    
          </div>

          <button class="btn btn-xs btn-outline"
            onclick="setPosition('center')">
            Center Card
          </button>
    
          <div class="flex gap-2 mt-3">
    
            <button
              class="btn btn-success btn-sm flex-1"
              onclick="setOverlayVisible(true)"
            >
              Show
            </button>
    
            <button
              class="btn btn-error btn-sm flex-1"
              onclick="setOverlayVisible(false)"
            >
              Hide
            </button>
    
          </div>
    
        </div>
      </section>
    
      <!-- HISTORY -->
      <section class="card bg-base-100 shadow-xl">
        <div class="card-body p-4">
    
          <h2 class="card-title text-lg mb-3">
            History
          </h2>
    
          <div class="flex gap-2">
    
            <button
              class="btn btn-warning btn-sm flex-1"
              onclick="undo()"
            >
              Undo
            </button>
    
            <button
              class="btn btn-info btn-sm flex-1"
              onclick="redo()"
            >
              Redo
            </button>
    
          </div>
    
        </div>
      </section>
    
    </div>

    <!-- =====================
         MAP POOL
    ====================== -->

    <section class="card bg-base-100 shadow-xl">
      <div class="card-body">

        <div class="flex items-center justify-between">
          <h2 class="card-title text-2xl">
            Map Pool
          </h2>
        </div>

        <div
          id="maps"
          class="grid grid-cols-1 xl:grid-cols-2 gap-5 mt-4"
        ></div>

      </div>
    </section>

    <!-- =====================
         DRAFT HISTORY
    ====================== -->

    <section class="card bg-base-100 shadow-xl">
      <div class="card-body">

        <h2 class="card-title text-2xl">
          Draft History
        </h2>

        <div
          id="history"
          class="space-y-3 mt-4"
        ></div>

      </div>
    </section>

  </div>

  <script src="/shared/ws.js"></script>
  <script src="control.js"></script>

</body>
</html>
